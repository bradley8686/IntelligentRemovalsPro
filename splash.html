<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline';" />
  <title>Intelligent Removals Pro - Loading</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0b1220;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: #eef4ff;
    }
    .logo-wrap { text-align: center; animation: fadein .8s ease-in-out; }
    .logo-wrap img { width: 122px; height: auto; border-radius: 14px; background: #ffffff12; padding: 12px; border: 1px solid #ffffff22; }
    .logo-wrap h1 { margin: 14px 0 6px; font-size: 22px; font-weight: 700; letter-spacing: 0; }
    .logo-wrap p { margin: 0; color: #aebed3; }
    @keyframes fadein { from { opacity: 0; transform: scale(.97); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="./assets/logo.png" alt="Intelligent Removals Pro">
    <h1>Intelligent Removals Pro</h1>
    <p>Loading survey tools</p>
  </div>
</body>
</html>
