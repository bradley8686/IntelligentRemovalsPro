<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; style-src 'self' 'unsafe-inline';" />
  <title>About - Intelligent Removals Pro</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: #0b1220;
      color: #eef4ff;
    }
    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 18px; }
    .card {
      background: #101a2e;
      border: 1px solid #24324a;
      border-radius: 8px;
      padding: 22px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 18px 48px rgba(0,0,0,.32);
    }
    .logo { height: 68px; width: auto; border-radius: 12px; background: #ffffff12; padding: 10px; border: 1px solid #ffffff20; }
    h1 { margin: 14px 0 6px; font-size: 22px; }
    p { margin: 6px 0; color: #b7c6dc; }
    small { color: #8ea0b8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <img class="logo" src="./assets/logo.png" alt="Intelligent Removals Pro logo" />
      <h1>Intelligent Removals Pro</h1>
      <p>Video inventory and vehicle recommendation software for removals teams.</p>
      <p id="ver"><small>Version -</small></p>
      <p><small>Copyright Intelligent Removals Pro. All rights reserved.</small></p>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const v = params.get('v') || 'dev';
    document.getElementById('ver').innerHTML = `<small>Version ${v}</small>`;
  </script>
</body>
</html>
